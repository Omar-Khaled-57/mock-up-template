<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Mockup Template</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c1: #3b1fa8;
    --c2: #7c2fd4;
    --c3: #1a0e6e;
    --c4: #0a0540;
    --angle: 135deg;
    --noise: 0.04;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0f0f13;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ── CONTROLS PANEL ── */
  #controls {
    width: 100%;
    background: #16161d;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding: 18px 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px 32px;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  #controls h2 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    flex-basis: 100%;
    margin-bottom: -8px;
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .ctrl-group label {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
  }

  input[type="color"] {
    width: 36px; height: 28px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    background: none;
    cursor: pointer;
    padding: 2px;
  }

  input[type="range"] {
    width: 110px;
    accent-color: #7c2fd4;
  }

  .ctrl-val {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    min-width: 34px;
    text-align: right;
  }

  button.export-btn {
    margin-left: auto;
    padding: 8px 20px;
    background: linear-gradient(135deg,#7c2fd4,#3b1fa8);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .2s;
  }
  button.export-btn:hover { opacity: .85; }

  /* ── CANVAS ── */
  #canvas-wrap {
    width: 100%;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 32px 64px;
  }

  #scene {
    width: 860px;
    max-width: 100%;
    aspect-ratio: 16/9;
    border-radius: 20px;
    background: linear-gradient(var(--angle), var(--c1), var(--c2), var(--c3), var(--c4));
    position: relative;
    overflow: hidden;
    box-shadow: 0 40px 120px rgba(0,0,0,.7);
    transition: background .3s;
  }

  /* subtle dot-grid overlay */
  #scene::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle, rgba(255,255,255,.14) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 1;
  }

  /* ── DEVICE FRAMES ── */
  .devices {
    position: absolute; inset: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 0;
    padding-bottom: 0;
    z-index: 2;
  }

  /* ─ TABLET ─ */
  .tablet-wrap {
    position: relative;
    width: 55%;
    bottom: -2%;
    flex-shrink: 0;
    z-index: 2;
  }

  .tablet {
    width: 100%;
    background: #18181f;
    border-radius: 18px 18px 0 0;
    border: 3px solid #2a2a38;
    border-bottom: none;
    overflow: hidden;
    position: relative;
    box-shadow: -12px 0 40px rgba(0,0,0,.5), 12px 0 40px rgba(0,0,0,.4);
  }

  .tablet::after { /* top bar */
    content: '';
    display: block;
    height: 8px;
    background: #111118;
    position: relative;
    z-index: 3;
  }

  .tablet-screen {
    width: 100%;
    aspect-ratio: 16/10;
    background: #222;
    overflow: hidden;
    position: relative;
  }

  /* ─ PHONE (center-front) ─ */
  .phone-center-wrap {
    position: absolute;
    width: 20%;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateX(10%);
    z-index: 5;
  }

  /* ─ PHONE (right, slightly behind) ─ */
  .phone-right-wrap {
    position: absolute;
    width: 17%;
    bottom: 0;
    right: 3%;
    z-index: 3;
    opacity: .92;
  }

  .phone {
    width: 100%;
    background: #18181f;
    border-radius: 22px 22px 0 0;
    border: 3px solid #2a2a38;
    border-bottom: none;
    overflow: hidden;
    box-shadow: -8px 0 24px rgba(0,0,0,.5);
  }

  .phone-notch {
    height: 10px;
    background: #111118;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 3;
  }

  .phone-notch::after {
    content: '';
    width: 30%;
    height: 5px;
    background: #222;
    border-radius: 3px;
  }

  .phone-screen {
    width: 100%;
    aspect-ratio: 9/16;
    background: #222;
    overflow: hidden;
    position: relative;
  }

  /* ─ SCREEN IMAGES ─ */
  .screen-img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }

  .upload-placeholder {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: rgba(0,0,0,.35);
    cursor: pointer;
    transition: background .2s;
    position: absolute; inset: 0;
  }
  .upload-placeholder:hover { background: rgba(0,0,0,.2); }

  .upload-placeholder svg { opacity: .5; }
  .upload-placeholder span {
    font-size: 10px;
    color: rgba(255,255,255,.45);
    text-align: center;
    line-height: 1.4;
  }

  .screen-container {
    position: relative;
    width: 100%; height: 100%;
  }

  .screen-container img.screen-img {
    position: absolute; inset: 0;
    z-index: 1;
  }

  .screen-container .upload-placeholder {
    z-index: 2;
  }

  .screen-container.has-image .upload-placeholder {
    opacity: 0;
    pointer-events: none;
  }
  .screen-container.has-image:hover .upload-placeholder {
    opacity: 1;
    pointer-events: all;
  }

  input[type="file"].file-input { display: none; }
</style>
</head>
<body>

<!-- ── CONTROLS ── -->
<div id="controls">
  <h2>Background Gradient</h2>

  <div class="ctrl-group">
    <label>Color 1</label>
    <input type="color" id="c1" value="#3b1fa8">
  </div>
  <div class="ctrl-group">
    <label>Color 2</label>
    <input type="color" id="c2" value="#7c2fd4">
  </div>
  <div class="ctrl-group">
    <label>Color 3</label>
    <input type="color" id="c3" value="#1a0e6e">
  </div>
  <div class="ctrl-group">
    <label>Color 4</label>
    <input type="color" id="c4" value="#0a0540">
  </div>
  <div class="ctrl-group">
    <label>Angle</label>
    <input type="range" id="angle" min="0" max="360" value="135">
    <span class="ctrl-val" id="angle-val">135°</span>
  </div>

  <button class="export-btn" onclick="exportPNG()">⬇ Export PNG</button>
</div>

<!-- ── SCENE ── -->
<div id="canvas-wrap">
  <div id="scene">
    <div class="devices">

      <!-- TABLET -->
      <div class="tablet-wrap">
        <div class="tablet">
          <div class="tablet-screen">
            <div class="screen-container" id="sc-tablet">
              <img class="screen-img" id="img-tablet" src="" style="display:none">
              <div class="upload-placeholder" onclick="triggerUpload('tablet')">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21 15 16 10 5 21"/>
                </svg>
                <span>Click to upload<br>tablet screenshot</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- PHONE CENTER -->
      <div class="phone-center-wrap">
        <div class="phone">
          <div class="phone-notch"></div>
          <div class="phone-screen">
            <div class="screen-container" id="sc-phone1">
              <img class="screen-img" id="img-phone1" src="" style="display:none">
              <div class="upload-placeholder" onclick="triggerUpload('phone1')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21 15 16 10 5 21"/>
                </svg>
                <span>Phone<br>screenshot</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- PHONE RIGHT -->
      <div class="phone-right-wrap">
        <div class="phone">
          <div class="phone-notch"></div>
          <div class="phone-screen">
            <div class="screen-container" id="sc-phone2">
              <img class="screen-img" id="img-phone2" src="" style="display:none">
              <div class="upload-placeholder" onclick="triggerUpload('phone2')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21 15 16 10 5 21"/>
                </svg>
                <span style="font-size:9px">Phone 2</span>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /devices -->
  </div><!-- /scene -->
</div><!-- /canvas-wrap -->

<!-- Hidden file inputs -->
<input type="file" class="file-input" id="file-tablet"  accept="image/*" onchange="loadImage(this,'tablet')">
<input type="file" class="file-input" id="file-phone1"  accept="image/*" onchange="loadImage(this,'phone1')">
<input type="file" class="file-input" id="file-phone2"  accept="image/*" onchange="loadImage(this,'phone2')">

<script>
  const scene = document.getElementById('scene');

  // ── Gradient controls ──
  const colorIds = ['c1','c2','c3','c4'];
  function updateGradient() {
    const angle = document.getElementById('angle').value;
    const colors = colorIds.map(id => document.getElementById(id).value);
    scene.style.background =
      `linear-gradient(${angle}deg, ${colors.join(', ')})`;
    document.getElementById('angle-val').textContent = angle + '°';
  }

  colorIds.forEach(id => {
    document.getElementById(id).addEventListener('input', updateGradient);
  });
  document.getElementById('angle').addEventListener('input', updateGradient);

  // ── Image upload ──
  function triggerUpload(key) {
    document.getElementById('file-' + key).click();
  }

  function loadImage(input, key) {
    const file = input.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    const img = document.getElementById('img-' + key);
    img.src = url;
    img.style.display = 'block';
    document.getElementById('sc-' + key).classList.add('has-image');
  }

  // ── Export PNG via html2canvas ──
  function exportPNG() {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    script.onload = () => {
      html2canvas(scene, {
        scale: 2,
        useCORS: true,
        backgroundColor: null,
        logging: false,
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'device-mockup.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    };
    document.head.appendChild(script);
  }
</script>
</body>
</html>
