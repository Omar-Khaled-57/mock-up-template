<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Mockup Template</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0f0f13;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── CONTROLS ── */
  #controls {
    width: 100%;
    background: #16161d;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding: 14px 28px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px 24px;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  #controls h2 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    flex-basis: 100%;
    margin-bottom: -4px;
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ctrl-group label {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    white-space: nowrap;
  }

  input[type="color"] {
    width: 34px; height: 26px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    background: none;
    cursor: pointer;
    padding: 2px;
  }

  input[type="range"] {
    width: 100px;
    accent-color: #7c2fd4;
  }

  .ctrl-val {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    min-width: 32px;
  }

  .ctrl-divider {
    width: 1px;
    height: 24px;
    background: rgba(255,255,255,0.1);
  }

  button.export-btn {
    margin-left: auto;
    padding: 7px 18px;
    background: linear-gradient(135deg,#7c2fd4,#3b1fa8);
    border: none;
    border-radius: 7px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
  }
  button.export-btn:hover { opacity: .82; }

  /* ── CANVAS WRAP ── */
  #canvas-wrap {
    width: 100%;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px 56px;
  }

  /* ── SCENE ── */
  #scene {
    width: 960px;
    max-width: 100%;
    aspect-ratio: 16/9;
    border-radius: 18px;
    background: linear-gradient(135deg, #3b1fa8, #7c2fd4, #1a0e6e, #0a0540);
    position: relative;
    overflow: hidden;
    box-shadow: 0 40px 120px rgba(0,0,0,.75);
  }

  /* dot-grid overlay */
  #scene::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,.12) 1px, transparent 1px);
    background-size: 26px 26px;
    pointer-events: none;
    z-index: 1;
  }

  /* ── TEXT AREA (left side) ── */
  .text-area {
    position: absolute;
    left: 5%;
    top: 50%;
    transform: translateY(-50%);
    width: 30%;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Editable title */
  .scene-title {
    font-family: 'Inter', sans-serif;
    font-size: clamp(18px, 3.2vw, 42px);
    font-weight: 900;
    line-height: 1.05;
    color: #fff;
    letter-spacing: -0.02em;
    outline: none;
    cursor: text;
    border-bottom: 2px dashed rgba(255,255,255,0.2);
    padding-bottom: 4px;
    transition: border-color .2s;
    word-break: break-word;
  }
  .scene-title:focus { border-color: rgba(255,255,255,0.5); }
  .scene-title:empty::before { content: attr(data-placeholder); color: rgba(255,255,255,.35); font-weight: 900; }

  /* Editable slogan */
  .scene-slogan {
    font-family: 'Inter', sans-serif;
    font-size: clamp(9px, 1.3vw, 16px);
    font-weight: 400;
    color: rgba(255,255,255,0.7);
    line-height: 1.5;
    outline: none;
    cursor: text;
    border-bottom: 1px dashed rgba(255,255,255,0.15);
    padding-bottom: 4px;
    transition: border-color .2s;
  }
  .scene-slogan:focus { border-color: rgba(255,255,255,0.4); }
  .scene-slogan:empty::before { content: attr(data-placeholder); color: rgba(255,255,255,.25); }

  /* ── DEVICES LAYER ── */
  .devices {
    position: absolute; inset: 0;
    z-index: 2;
  }

  /* ── PC / MONITOR ── */
  .monitor-wrap {
    position: absolute;
    right: 2%;
    bottom: 0;
    width: 56%;
    z-index: 2;
  }

  .monitor {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .monitor-body {
    width: 100%;
    background: #1c1c26;
    border-radius: 10px 10px 0 0;
    border: 3px solid #2e2e40;
    border-bottom: none;
    overflow: hidden;
    box-shadow: -16px 10px 50px rgba(0,0,0,.55), 10px 10px 40px rgba(0,0,0,.4);
  }

  .monitor-bar {
    height: 14px;
    background: #111118;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 5px;
    flex-shrink: 0;
  }
  .monitor-bar span {
    width: 7px; height: 7px;
    border-radius: 50%;
    display: inline-block;
  }
  .monitor-bar span:nth-child(1) { background: #ff5f57; }
  .monitor-bar span:nth-child(2) { background: #febc2e; }
  .monitor-bar span:nth-child(3) { background: #28c840; }

  .monitor-screen {
    width: 100%;
    aspect-ratio: 16/10;
    background: #1a1a24;
    overflow: hidden;
    position: relative;
  }

  .monitor-stand {
    width: 12%;
    height: 14px;
    background: #1c1c26;
    border: 3px solid #2e2e40;
    border-top: none;
    margin: 0 auto;
  }
  .monitor-base {
    width: 22%;
    height: 5px;
    background: #1c1c26;
    border: 3px solid #2e2e40;
    border-top: none;
    border-radius: 0 0 4px 4px;
    margin: 0 auto;
  }

  /* ── IPAD ── */
  .ipad-wrap {
    position: absolute;
    right: 26%;
    bottom: 0;
    width: 24%;
    z-index: 4;
  }

  .ipad {
    width: 100%;
    background: #1c1c26;
    border-radius: 14px 14px 0 0;
    border: 3px solid #2e2e40;
    border-bottom: none;
    overflow: hidden;
    box-shadow: -10px 5px 32px rgba(0,0,0,.55);
  }

  .ipad-bar {
    height: 10px;
    background: #111118;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ipad-bar::after {
    content: '';
    width: 22%;
    height: 4px;
    background: #222230;
    border-radius: 2px;
  }

  .ipad-screen {
    width: 100%;
    aspect-ratio: 4/5.5;
    background: #1a1a24;
    overflow: hidden;
    position: relative;
  }

  /* ── PHONE ── */
  .phone-wrap {
    position: absolute;
    right: 14%;
    bottom: 0;
    width: 13%;
    z-index: 6;
  }

  .phone {
    width: 100%;
    background: #1c1c26;
    border-radius: 18px 18px 0 0;
    border: 3px solid #2e2e40;
    border-bottom: none;
    overflow: hidden;
    box-shadow: -8px 5px 24px rgba(0,0,0,.6);
  }

  .phone-notch {
    height: 10px;
    background: #111118;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .phone-notch::after {
    content: '';
    width: 30%;
    height: 5px;
    background: #222230;
    border-radius: 3px;
  }

  .phone-screen {
    width: 100%;
    aspect-ratio: 9/17;
    background: #1a1a24;
    overflow: hidden;
    position: relative;
  }

  /* ── SCREEN CONTAINER (shared) ── */
  .screen-container {
    position: relative;
    width: 100%; height: 100%;
  }

  .screen-container img.screen-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    z-index: 1;
    display: none;
  }

  .upload-placeholder {
    position: absolute; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 7px;
    background: rgba(0,0,0,.3);
    cursor: pointer;
    transition: background .2s;
    z-index: 2;
  }
  .upload-placeholder:hover { background: rgba(0,0,0,.15); }
  .upload-placeholder svg { opacity: .45; }
  .upload-placeholder span {
    font-size: 9px;
    color: rgba(255,255,255,.4);
    text-align: center;
    line-height: 1.4;
    font-family: 'Inter', sans-serif;
  }

  .screen-container.has-image .upload-placeholder { opacity: 0; pointer-events: none; }
  .screen-container.has-image:hover .upload-placeholder { opacity: 1; pointer-events: all; }

  input[type="file"].file-input { display: none; }

  /* edit hint */
  .edit-hint {
    position: absolute;
    top: 10px; left: 5%;
    font-size: 10px;
    color: rgba(255,255,255,.25);
    z-index: 20;
    pointer-events: none;
    font-family: 'Inter', sans-serif;
  }
</style>
</head>
<body>

<!-- ── CONTROLS ── -->
<div id="controls">
  <h2>Gradient Background</h2>

  <div class="ctrl-group">
    <label>Color 1</label>
    <input type="color" id="c1" value="#3b1fa8">
  </div>
  <div class="ctrl-group">
    <label>Color 2</label>
    <input type="color" id="c2" value="#7c2fd4">
  </div>
  <div class="ctrl-group">
    <label>Color 3</label>
    <input type="color" id="c3" value="#1a0e6e">
  </div>
  <div class="ctrl-group">
    <label>Color 4</label>
    <input type="color" id="c4" value="#0a0540">
  </div>
  <div class="ctrl-divider"></div>
  <div class="ctrl-group">
    <label>Angle</label>
    <input type="range" id="angle" min="0" max="360" value="135">
    <span class="ctrl-val" id="angle-val">135°</span>
  </div>

  <button class="export-btn" onclick="exportPNG()">⬇ Export PNG</button>
</div>

<!-- ── SCENE ── -->
<div id="canvas-wrap">
  <div id="scene">

    <span class="edit-hint">✎ click title / slogan to edit</span>

    <!-- Text -->
    <div class="text-area">
      <div class="scene-title" contenteditable="true" data-placeholder="YOUR TITLE">ANALYTICAL<br>DATA COLLECTION</div>
      <div class="scene-slogan" contenteditable="true" data-placeholder="Your slogan goes here">Powerful insights at your fingertips. Collect, analyze, and visualize your data.</div>
    </div>

    <!-- Devices -->
    <div class="devices">

      <!-- PC MONITOR -->
      <div class="monitor-wrap">
        <div class="monitor">
          <div class="monitor-body">
            <div class="monitor-bar">
              <span></span><span></span><span></span>
            </div>
            <div class="monitor-screen">
              <div class="screen-container" id="sc-monitor">
                <img class="screen-img" id="img-monitor" src="">
                <div class="upload-placeholder" onclick="triggerUpload('monitor')">
                  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <line x1="8" y1="21" x2="16" y2="21"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                  </svg>
                  <span>PC / Desktop<br>screenshot</span>
                </div>
              </div>
            </div>
          </div>
          <div class="monitor-stand"></div>
          <div class="monitor-base"></div>
        </div>
      </div>

      <!-- IPAD -->
      <div class="ipad-wrap">
        <div class="ipad">
          <div class="ipad-bar"></div>
          <div class="ipad-screen">
            <div class="screen-container" id="sc-ipad">
              <img class="screen-img" id="img-ipad" src="">
              <div class="upload-placeholder" onclick="triggerUpload('ipad')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="5" y="2" width="14" height="20" rx="2"/>
                  <circle cx="12" cy="18" r="1"/>
                </svg>
                <span>iPad<br>screenshot</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- PHONE -->
      <div class="phone-wrap">
        <div class="phone">
          <div class="phone-notch"></div>
          <div class="phone-screen">
            <div class="screen-container" id="sc-phone">
              <img class="screen-img" id="img-phone" src="">
              <div class="upload-placeholder" onclick="triggerUpload('phone')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="5" y="2" width="14" height="20" rx="2"/>
                  <circle cx="12" cy="18" r="1"/>
                </svg>
                <span>Phone<br>screenshot</span>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div><!-- /devices -->
  </div><!-- /scene -->
</div>

<!-- Hidden file inputs -->
<input type="file" class="file-input" id="file-monitor" accept="image/*" onchange="loadImage(this,'monitor')">
<input type="file" class="file-input" id="file-ipad"    accept="image/*" onchange="loadImage(this,'ipad')">
<input type="file" class="file-input" id="file-phone"   accept="image/*" onchange="loadImage(this,'phone')">

<script>
  const scene = document.getElementById('scene');
  const colorIds = ['c1','c2','c3','c4'];

  function updateGradient() {
    const angle  = document.getElementById('angle').value;
    const colors = colorIds.map(id => document.getElementById(id).value);
    scene.style.background = `linear-gradient(${angle}deg, ${colors.join(', ')})`;
    document.getElementById('angle-val').textContent = angle + '°';
  }

  colorIds.forEach(id => document.getElementById(id).addEventListener('input', updateGradient));
  document.getElementById('angle').addEventListener('input', updateGradient);

  function triggerUpload(key) { document.getElementById('file-' + key).click(); }

  function loadImage(input, key) {
    const file = input.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    const img = document.getElementById('img-' + key);
    img.src = url;
    img.style.display = 'block';
    document.getElementById('sc-' + key).classList.add('has-image');
  }

  function exportPNG() {
    const hint = document.querySelector('.edit-hint');
    hint.style.display = 'none';
    // hide dashed borders temporarily
    document.querySelectorAll('.scene-title,.scene-slogan').forEach(el => {
      el.style.borderBottomColor = 'transparent';
    });
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    script.onload = () => {
      html2canvas(scene, { scale: 2, useCORS: true, backgroundColor: null, logging: false })
        .then(canvas => {
          const link = document.createElement('a');
          link.download = 'device-mockup.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
          hint.style.display = '';
          document.querySelectorAll('.scene-title,.scene-slogan').forEach(el => {
            el.style.borderBottomColor = '';
          });
        });
    };
    document.head.appendChild(script);
  }
</script>
</body>
</html>
